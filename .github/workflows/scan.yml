name: Docker Scout Security Scan

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5  # Latest

    - name: Login to GHCR
      uses: docker/login-action@v4  # Latest

    - name: Setup Buildx
      uses: docker/setup-buildx-action@v4  # Fixes cache

    - name: Build & push (no cache issues)
      uses: docker/build-push-action@v7  # Latest
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/eshop-platform-cpp:latest

    - name: Docker Scout
      uses: docker/scout-action@v2  # Latest stable
      with:
        image: ghcr.io/${{ github.repository_owner }}/eshop-platform-cpp:latest
        command: cves
        only-severities: CRITICAL,HIGH,MEDIUM
        summary: true
