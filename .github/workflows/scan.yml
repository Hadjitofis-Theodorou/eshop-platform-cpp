name: Docker Scout Security Scan

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Login Docker Hub (for Scout)
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build & push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ghcr.io/hadjitofis-theodorou/eshop-platform-cpp:latest

    - name: Docker Scout
      uses: docker/scout-action@v1
      with:
        image: ghcr.io/hadjitofis-theodorou/eshop-platform-cpp:latest
        command: cves
        only-severities: CRITICAL,HIGH,MEDIUM
        summary: true
