name: Docker Scout Security Scan

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build & push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ghcr.io/hadjitofis-theodorou/eshop-platform-cpp:latest  # ALL lowercase username!
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Docker Scout (scans for vulns)
      uses: docker/scout-action@v1
      with:
        image: ghcr.io/hadjitofis-theodorou/eshop-platform-cpp:latest  
        command: cves
        only-severities: CRITICAL,HIGH,MEDIUM
        summary: true
